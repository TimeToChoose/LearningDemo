spring.application.name=LearningDemo
server.port=8080

# MySQL（本地：root / 12345678）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/learning_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库已手动初始化时保持 never，避免重复建表
spring.sql.init.mode=never

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.shineofeidos.demo.model

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs

# JWT
jwt.secret=LearningDemo-Jwt-Secret-Key-Change-In-Production-32chars-min
jwt.access-expire-minutes=30
jwt.refresh-expire-days=7
